apiVersion: apps/v1
kind: Deployment
metadata:
  name: campus-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: campus-frontend
  template:
    metadata:
      labels:
        app: campus-frontend
    spec:
      containers:
      - name: campus-frontend
        image: your-dockerhub-username/campus-frontend:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: campus-frontend-service
spec:
  type: LoadBalancer
  selector:
    app: campus-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
